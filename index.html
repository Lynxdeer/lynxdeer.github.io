<!DOCTYPE HTML>

<head>
	
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu">
	<style>
		body, html {
			height: 100%;
			margin:0;
			background: #1B1B1B;
		}
		h1 {
			font-size: 1.5vw;

			background-image: url(https://media.discordapp.net/attachments/913838785354154044/1120596045483757618/NetherUpdateArtwork.png);

			background-repeat: round;
			box-shadow: 0 0 200px rgba(0,0,0,0.9) inset;
		}
		.coolhexagoncontainer {
			position: abxolute;
			text-align: center;
			background-color: #00ff00;
		}
		
	</style>
</head>
<body>
	<div id="topbox" class="topbox">

		<br>
		<h2><strong>Pushing the limits</strong></h2>

	</div>

</html>
